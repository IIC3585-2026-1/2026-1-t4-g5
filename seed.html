<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Seeds - Gym Tracker PWA</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png" sizes="192x192" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <p id="offline-banner" class="offline-banner" role="status" hidden></p>

  <main class="app-container">
    <header class="app-header">
      <p class="app-kicker">Gym Tracker</p>
      <h1>Datos de prueba</h1>
    </header>

    <section class="seed-card">
      <p>
        Carga entrenamientos de ejemplo para probar el historial, el filtro por dia
        y la progresion semanal sin llenar todo a mano.
      </p>

      <div class="seed-actions">
        <button type="button" id="seed-button">Cargar seeds</button>
        <button type="button" class="secondary-button" id="clear-button">Limpiar datos</button>
        <a href="index.html">Volver a la app</a>
      </div>

      <p class="seed-status" id="seed-status"></p>
    </section>
  </main>

  <script src="js/register-sw.js"></script>
  <script src="js/seeds.js"></script>
</body>
</html>
